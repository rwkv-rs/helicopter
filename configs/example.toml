# Environment-specific values live in .env.local or .env.remote:
# WEIGHT_PATH, DATASETS_PATH, GPU counts, venv paths, and machine-local paths.
# Select experiments with --config; without --config, the CLI uses the newest
# configs/local/*.toml file.

[infer]
enable_auto_tool_choice = false

[eval]
# Workload identity fields may be overridden by explicit CLI flags. Secrets are
# read only from --endpoint-api-key-env / --scoreboard-token-env and never TOML.
endpoint_url = "http://127.0.0.1:8000/v1"
checkpoint_sha256 = "replace-with-64-character-checkpoint-digest"
tokenizer_revision = "rwkv-tokenizer-v1"
chat_template_revision = "rwkv-chat-v1"
wkv_mode = "fp32io16"
precision = "fp16-io-fp32-state"
gemm_policy = "fp32-accumulation"
launch_contract = "helicopter-eval-eager-v1"
output_root = "src/eval/lighteval/results"
cot_mode = "none"
math_repair_strategy = "A"
# GB10/g1h-7.2b capacity sweep: keep more requests in flight than the
# max_num_seqs=512 server capacity. OpenAI's transport limit is 1000.
max_concurrent_requests = 1000
request_timeout_seconds = 3600
allow_non_comparable = false

[takeoff.grpo]
project_name = "verl_rwkv_grpo"
experiment_name = "rwkv7_grpo_vllm"
wkv_mode = "fp32io16"
train_batch_size = 56
ppo_mini_batch_size = 56
ppo_micro_batch_size = 1
max_prompt_length = 1024
max_response_length = 7168
ppo_max_token_len_per_gpu = 8192
rwkv_use_dynamic_bsz = false
actor_lr = "1e-5"
reward_function = "math_verify"
rollout_n = 8
trainer_n_gpus_per_node = 7
rollout_n_gpus_per_node = 1
rollout_mode = "async"
rollout_tensor_parallel_size = 1
rollout_data_parallel_size = 1
rollout_pipeline_parallel_size = 1
rollout_checkpoint_engine_backend = "nccl"
rollout_correction_bypass_mode = true
total_epochs = 2
save_freq = 20
test_freq = -1
val_n = 4
val_before_train = true
rwkv_generation_prompt = "open_think"
val_rwkv_generation_prompt = "open_think"

[datasets.gsm8k]
# When root is omitted, the CLI uses ${DATASETS_PATH}/gsm8k.

[models."g1g-1.5b"]
file = "rwkv7-g1g-1.5b-20260526-ctx8192.pth"
served_model_name = "g1g-1.5b"

[models."g1d-0.4b"]
path = "/home/chase/GitHub/rwkv-rs/pth/rwkv7-g1d-0.4b-20260210-ctx8192.pth"
served_model_name = "g1d-0.4b"

[models."g1d-0.4b".infer]
vllm_bin = "/home/chase/GitHub/vllm-rwkv/.venv/bin/vllm"
wkv_mode = "fp16"
gpu_memory_utilization = 0.45
max_num_seqs = 8
max_num_batched_tokens = 8192

[models."g1d-0.4b".infer.vllm_env]
VLLM_WSL2_ENABLE_PIN_MEMORY = "1"
VLLM_USE_RAPID_SAMPLER = "0"
VLLM_USE_FLASHINFER_SAMPLER = "0"

[models."g1g-7.2b"]
file = "rwkv7-g1g-7.2b-20260523-ctx8192.pth"
served_model_name = "g1g-7.2b"

[models."g1h-7.2b-eval"]
path = "/home/caizus/Weights/RWKV/rwkv7/pth/rwkv7-g1h-7.2b-20260710-ctx10240.pth"
served_model_name = "rwkv7-g1h-7.2b-eval"
sha256 = "1fe61e5c4b9037ffd4723a11c4de146d99c26bcd89e00a61afa67ef653d215e8"

[models."g1h-7.2b-eval".infer]
wkv_mode = "fp32io16"
gpu_memory_utilization = 0.9
# Local GB10 eager-mode sweep selected B512: B1024 was slower while consuming
# about twice the recurrent-state memory.
max_num_seqs = 512
max_num_batched_tokens = 10240
tokenizer_revision = "sha256:e6dee3d4e31b4d5c40ac99508ac6c701ceef4bed681bf2167ce9a908552bca89"
chat_template_revision = "sha256:87a5c16f5f052451b2daa261baed47a08a4d15e7e0e3888761beda2a836cecfe"
precision = "fp16-io-fp32-state"
gemm_policy = "fp32-accumulation"
launch_contract = "helicopter-eval-eager-v1"
